# Створює GitHub Release з артефактом PDF_Rename_Expert.exe (PyInstaller, Windows).
# Тригери: push тега v* або workflow_dispatch (існуючий тег).
#
# JS-actions (checkout, gh-release): Node 24 — див. action.yml / env нижче.
name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Тег, який уже є на GitHub (наприклад v1.2.0)"
        required: true
        default: "v1.2.0"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build executable (PyInstaller)
        run: pyinstaller --noconfirm PDF_Rename_Expert.spec

      - name: Create GitHub Release with EXE
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/PDF_Rename_Expert.exe
