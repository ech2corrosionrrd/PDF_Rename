# Створює GitHub Release з артефактом PDF_Rename_Expert.exe (PyInstaller, Windows).
# Ручний запуск (workflow_dispatch): тег має вже існувати на GitHub (git push origin <tag>).
#
# JS-actions на Node 24: checkout@v5.0.1, setup-python@v6.2.0, action-gh-release@v3.0.0; env FORCE_JAVASCRIPT_ACTIONS_TO_NODE24.
name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Тег, який уже є на GitHub (спочатку git push origin <tag>)"
        required: true
        default: "v1.3.0"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.1
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Перейти на тег релізу
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}".Trim()
            if (-not $tag) { throw "Порожній тег." }
            $remote = git ls-remote origin "refs/tags/$tag"
            if (-not $remote) {
              Write-Host "::error title=Тег відсутній на GitHub::Тег '$tag' не знайдено на origin. Створіть і запуште: git tag $tag && git push origin $tag"
              exit 128
            }
            git fetch origin "refs/tags/${tag}:refs/tags/${tag}"
            git checkout $tag
          } else {
            git checkout "${{ github.ref_name }}"
          }

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build executable (PyInstaller)
        run: pyinstaller --noconfirm PDF_Rename_Expert.spec

      - name: Create GitHub Release with EXE
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/PDF_Rename_Expert.exe
